<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votación · Peña La Feria</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<main class="page">

<header class="header">
  <img src="logo.png" class="cabecera" alt="Peña La Feria">
</header>

<div class="progreso">
  <div class="progreso-texto">Paso 6 de 11</div>
  <div class="progreso-puntos">
    <span class="activo"></span>
    <span class="activo"></span>
    <span class="activo"></span>
    <span class="activo"></span>
    <span class="activo"></span>
    <span class="activo"></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<section class="hero">

  <div>
    <h1>Votación</h1>

    <p>
      ¿Estás de acuerdo con que <strong>José Vilches</strong> continúe un año más como encargado de coordinar la caseta?
    </p>

    <div class="opciones-voto">

      <label class="radio-item">
        <input type="radio" name="coordinador" value="si">
        <span>Sí, estoy de acuerdo.</span>
      </label>

      <label class="radio-item">
        <input type="radio" name="coordinador" value="no">
        <span>No estoy de acuerdo. Me gustaría asumir la coordinación yo mismo u otra persona.</span>
      </label>

<textarea
    class="comentario-voto"
    placeholder="Si has elegido la segunda opción, puedes indicar aquí tu propuesta o explicar brevemente tu opinión.">
</textarea>
     
    </div>
  </div>

  <div class="foto-box">
    <img src="logopeña.png" class="foto-socio" alt="Logo Peña La Feria">
  </div>

</section>

<div class="navegacion doble">
  <a href="candidatura.html" class="boton-outline">← Atrás</a>
  <button class="boton-outline" onclick="continuar()">Siguiente →</button>
</div>

<footer>
  Peña La Feria · Feria de Andújar 2026
</footer>

</main>
<script>
function continuar(){

  const opcion = document.querySelector('input[name="coordinador"]:checked');

  if(!opcion){
    alert("Debes seleccionar una opción antes de continuar.");
    return;
  }

  guardarRespuesta("coordinador", opcion.value);
  guardarRespuesta(
    "comentario_coordinador",
    document.querySelector(".comentario-voto").value
  );

  window.location.href = "proyecto.html";
}
</script>

<script src="guardar.js"></script>

</body>
</html>
