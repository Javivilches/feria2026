<title>Resultados de las votaciones | Peña La Feria 2026</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial, Helvetica, sans-serif;

    background:
    radial-gradient(circle at top left, rgba(255,255,255,.35), transparent 40%),
    radial-gradient(circle at bottom right, rgba(255,255,255,.25), transparent 40%),
    repeating-linear-gradient(
        45deg,
        rgba(255,255,255,.04) 0px,
        rgba(255,255,255,.04) 18px,
        transparent 18px,
        transparent 36px
    ),
    linear-gradient(180deg,#f6efdc 0%,#eadfc3 100%);

    color:#222;
}

header{
    text-align:center;
    padding:40px 15px 25px;
}

h1{
    font-size:clamp(34px,6vw,64px);
    color:#0b6d37;
    text-transform:uppercase;
    letter-spacing:2px;
}

h2{
    margin-top:10px;
    color:#c62828;
    font-size:clamp(18px,3vw,30px);
    font-weight:bold;
}

.contenedor{

    width:min(1200px,95%);
    margin:auto;
    padding-bottom:50px;

}

.tarjeta{

    background:white;

    border:5px solid #008542;

    border-radius:22px;

    padding:14px;

    margin-bottom:35px;

    box-shadow:
        0 10px 35px rgba(0,0,0,.18);

}

.tarjeta img{

    width:100%;

    display:block;

    border-radius:12px;

}

footer{

    text-align:center;

    padding:25px;

    color:#0b6d37;

    font-weight:bold;

    font-size:18px;

}

@media(max-width:700px){

header{

padding-top:25px;

}

.tarjeta{

padding:8px;

border-width:3px;

margin-bottom:20px;

}

}
</style>

</head>

</header>
